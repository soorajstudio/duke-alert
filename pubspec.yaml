name: alert_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  shared_preferences: ^2.5.5
  android_alarm_manager_plus: ^5.0.0
  telephony: ^0.2.0
  # Handles incoming dukelert:// deep-links on Phone B (In-App forward method)
  # app_links replaces the broken uni_links package (uni_links fails on AGP 8+)
  app_links: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21